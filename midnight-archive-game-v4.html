<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Midnight Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0f;
  --ink-purple: #1a1525;
  --tarnished-gold: #8b7355;
  --gold-bright: #c9a84c;
  --parchment: #e8dcc4;
  --ash-white: #c9c5bf;
  --room-bg: #0a0a0f;
  --room-accent: #8b7355;
  --room-glow: rgba(139,115,85,0.08);
  --room-vignette: #0a0a0f;
  --room-text: #c9c5bf;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:var(--black); color:var(--parchment); font-family:'IM Fell English',serif; min-height:100vh; overflow-x:hidden; }

#env-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
#vignette { position:fixed; inset:0; z-index:1; pointer-events:none; background:radial-gradient(ellipse at center,transparent 30%,var(--room-vignette) 100%); transition:background 1.5s; }
#noise { position:fixed; inset:0; z-index:2; pointer-events:none; opacity:0.04; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size:256px; }

/* TITLE */
#title-screen { position:relative; z-index:10; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:60px 30px; }
.t-eyebrow { font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:0.45em; color:var(--tarnished-gold); margin-bottom:30px; opacity:0; animation:riseIn 1.8s ease 0.3s forwards; }
.t-word { display:block; font-family:'Cinzel',serif; font-size:clamp(3.2rem,15vw,5.5rem); font-weight:400; line-height:0.95; color:var(--parchment); opacity:0; animation:riseIn 1.8s ease forwards; }
.t-word:nth-child(2){animation-delay:0.5s} .t-word:nth-child(3){animation-delay:0.8s} .t-word.gold{color:var(--tarnished-gold);animation-delay:1.1s}
.t-rule { width:60px; height:1px; background:var(--tarnished-gold); margin:28px auto; opacity:0; animation:riseIn 1.8s ease 1.4s forwards; }
.t-tagline { font-style:italic; font-size:0.88rem; color:var(--ash-white); line-height:1.75; max-width:290px; opacity:0; animation:riseIn 1.8s ease 1.6s forwards; }
.t-btn { display:inline-block; margin-top:36px; border:1px solid rgba(139,115,85,0.5); padding:15px 44px; font-family:'Cinzel',serif; font-size:0.65rem; letter-spacing:0.4em; color:var(--tarnished-gold); background:transparent; cursor:pointer; transition:all 0.5s; opacity:0; animation:riseIn 1.8s ease 2s forwards; }
.t-btn:hover { background:rgba(139,115,85,0.1); border-color:var(--tarnished-gold); color:var(--parchment); letter-spacing:0.5em; }
.t-whisper { position:absolute; bottom:32px; right:24px; font-style:italic; font-size:0.72rem; color:rgba(201,197,191,0.2); animation:breathe 6s ease-in-out infinite; }
@keyframes riseIn { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
@keyframes breathe { 0%,100%{opacity:0.15} 50%{opacity:0.5} }

/* GAME */
#game-screen { display:none; position:relative; z-index:10; min-height:100vh; flex-direction:column; }
#game-screen.active { display:flex; }

/* HUD */
.hud { position:fixed; top:0; left:0; right:0; z-index:50; padding:14px 20px 20px; display:flex; align-items:center; justify-content:space-between; background:linear-gradient(180deg,rgba(10,10,15,0.95) 0%,transparent 100%); }
.hud-left { font-family:'Cinzel',serif; font-size:0.45rem; letter-spacing:0.3em; color:rgba(139,115,85,0.4); }
.hud-pips { display:flex; gap:7px; align-items:center; }
.pip { width:7px; height:7px; border-radius:50%; border:1px solid rgba(139,115,85,0.25); background:transparent; transition:all 0.5s; }
.pip.lit { background:var(--tarnished-gold); border-color:var(--tarnished-gold); box-shadow:0 0 8px rgba(139,115,85,0.7); }
.pip.false { background:#4a2a2a; border-color:#7a3a3a; box-shadow:0 0 8px rgba(120,40,40,0.7); }
.hud-right { display:flex; gap:12px; align-items:center; }
.hud-btn { font-family:'Cinzel',serif; font-size:0.42rem; letter-spacing:0.2em; color:rgba(139,115,85,0.4); cursor:pointer; padding:4px 8px; border:1px solid rgba(139,115,85,0.15); background:transparent; transition:all 0.3s; }
.hud-btn:hover { color:var(--tarnished-gold); border-color:rgba(139,115,85,0.4); }

/* ROOM ENV */
.room-env { position:relative; width:100%; height:180px; flex-shrink:0; overflow:hidden; margin-top:50px; }
.room-env-art { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.env-svg { width:100%; height:100%; opacity:0.22; transition:opacity 1.5s; }
.room-env-gradient { position:absolute; bottom:0; left:0; right:0; height:80px; background:linear-gradient(to bottom,transparent,var(--room-bg)); transition:background 1.5s; }
.room-env-inner { position:absolute; inset:0; display:flex; align-items:flex-end; padding:20px 24px; }
.room-eyebrow { font-family:'Cinzel',serif; font-size:0.5rem; letter-spacing:0.35em; color:var(--room-accent); margin-bottom:4px; transition:color 1s; }
.room-heading { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:clamp(1.7rem,7vw,2.4rem); color:var(--parchment); line-height:1.05; }

/* NARRATIVE */
.narrative { flex:1; padding:20px 24px 10px; max-width:580px; width:100%; margin:0 auto; }
.tl { font-size:0.92rem; line-height:1.85; color:var(--room-text); margin-bottom:14px; opacity:0; transition:color 1s; }
.tl.show { opacity:1; }
.tl.t-italic { font-style:italic; color:rgba(201,197,191,0.65); font-size:0.87rem; }
.tl.t-archive { font-style:italic; color:var(--room-accent); border-left:1px solid rgba(139,115,85,0.25); padding-left:14px; font-size:0.87rem; transition:color 1s,border-color 1s; }
.tl.t-archive.corrupted { color:#b060a0; border-color:rgba(180,80,160,0.3); }
.tl.t-archivist { font-style:italic; color:rgba(232,220,196,0.75); border-left:2px solid rgba(201,197,191,0.15); padding-left:14px; font-size:0.87rem; }
.tl.t-archivist.archive-mimic { color:var(--room-accent); border-left-color:rgba(139,115,85,0.25); }
.tl.t-discovery { font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:0.18em; color:var(--gold-bright); border:1px solid rgba(201,168,76,0.2); padding:14px 18px; background:rgba(201,168,76,0.03); line-height:1.8; }
.tl.t-false-discovery { font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:0.18em; color:#c06060; border:1px solid rgba(180,60,60,0.2); padding:14px 18px; background:rgba(180,60,60,0.03); line-height:1.8; }
.tl.t-journal { font-size:0.82rem; font-style:italic; color:rgba(201,197,191,0.5); border-left:1px solid rgba(201,197,191,0.1); padding-left:12px; }
.tl.t-empty { height:8px; margin-bottom:0; }
.tl.t-raven { color:#9090c0; font-style:italic; font-size:0.87rem; }
.tcursor { display:inline-block; width:1.5px; height:0.9em; background:var(--room-accent); margin-left:1px; vertical-align:text-bottom; animation:blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* CHOICES */
.choices { padding:0 24px 60px; max-width:580px; width:100%; margin:0 auto; }
.choices-rule { height:1px; background:linear-gradient(to right,var(--room-accent),transparent); opacity:0.2; margin-bottom:18px; }
.choice { display:block; width:100%; text-align:left; padding:15px 18px; background:rgba(26,21,37,0.25); border:1px solid rgba(139,115,85,0.1); color:rgba(201,197,191,0.7); font-family:'IM Fell English',serif; font-size:0.87rem; line-height:1.55; cursor:pointer; margin-bottom:8px; transition:all 0.35s; position:relative; overflow:hidden; }
.choice::after { content:''; position:absolute; inset:0; background:rgba(139,115,85,0.06); opacity:0; transition:opacity 0.3s; }
.choice:hover::after { opacity:1; }
.choice:hover { border-color:rgba(139,115,85,0.3); color:var(--parchment); }
.choice-label { display:block; font-family:'Cinzel',serif; font-size:0.48rem; letter-spacing:0.25em; color:var(--room-accent); margin-bottom:5px; transition:color 1s; }

/* PANEL (inventory/journal) */
#panel-overlay { position:fixed; inset:0; z-index:150; background:rgba(10,10,15,0.88); display:none; align-items:stretch; justify-content:flex-end; }
#panel-overlay.open { display:flex; }
#panel { width:min(340px,100vw); background:linear-gradient(180deg,#100c18 0%,#0a0a0f 100%); border-left:1px solid rgba(139,115,85,0.2); display:flex; flex-direction:column; overflow:hidden; animation:slidePanel 0.3s ease forwards; }
@keyframes slidePanel { from{transform:translateX(100%)} to{transform:translateX(0)} }
.panel-tabs { display:flex; border-bottom:1px solid rgba(139,115,85,0.15); }
.ptab { flex:1; padding:16px 8px; background:none; border:none; font-family:'Cinzel',serif; font-size:0.52rem; letter-spacing:0.2em; color:rgba(201,197,191,0.3); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all 0.2s; }
.ptab.active { color:var(--tarnished-gold); border-bottom-color:var(--tarnished-gold); }
.panel-close { padding:12px 16px; font-family:'Cinzel',serif; font-size:0.48rem; letter-spacing:0.2em; color:rgba(139,115,85,0.4); cursor:pointer; border-top:1px solid rgba(139,115,85,0.1); text-align:center; transition:color 0.2s; }
.panel-close:hover { color:var(--tarnished-gold); }
.panel-body { flex:1; overflow-y:auto; padding:20px 18px; }
.panel-body::-webkit-scrollbar { width:2px; } .panel-body::-webkit-scrollbar-thumb { background:rgba(139,115,85,0.3); }

/* Inventory items */
.inv-item { padding:14px 0; border-bottom:1px solid rgba(139,115,85,0.1); }
.inv-item:last-child { border-bottom:none; }
.inv-icon { font-size:1.2rem; margin-bottom:6px; }
.inv-name { font-family:'Cormorant Garamond',serif; font-size:1rem; color:var(--parchment); margin-bottom:2px; }
.inv-role { font-family:'Cinzel',serif; font-size:0.42rem; letter-spacing:0.2em; color:var(--tarnished-gold); margin-bottom:6px; }
.inv-desc { font-size:0.78rem; font-style:italic; color:var(--ash-white); line-height:1.5; }
.inv-false { opacity:0.6; }
.inv-false .inv-name { color:#c06060; }
.inv-false .inv-role { color:#a04040; }
.inv-empty { font-style:italic; font-size:0.82rem; color:rgba(201,197,191,0.3); text-align:center; padding:30px 0; }
.inv-raven { margin-top:16px; padding:14px; border:1px solid rgba(144,144,192,0.2); background:rgba(144,144,192,0.04); }
.inv-raven-label { font-family:'Cinzel',serif; font-size:0.42rem; letter-spacing:0.2em; color:#9090c0; margin-bottom:6px; }
.inv-raven-text { font-size:0.78rem; font-style:italic; color:rgba(144,144,192,0.7); line-height:1.5; }

/* Journal entries */
.j-entry { margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid rgba(139,115,85,0.08); }
.j-entry:last-child { border-bottom:none; }
.j-time { font-family:'Cinzel',serif; font-size:0.4rem; letter-spacing:0.2em; color:rgba(139,115,85,0.3); margin-bottom:6px; }
.j-text { font-size:0.82rem; line-height:1.7; color:rgba(201,197,191,0.6); font-style:italic; }
.j-text.archive-entry { color:rgba(139,115,85,0.6); }
.j-text.corrupted-entry { color:rgba(180,80,160,0.6); }

/* ARTIFACT OVERLAY */
#artifact-overlay { position:fixed; inset:0; z-index:200; background:rgba(10,10,15,0.96); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 30px; opacity:0; pointer-events:none; transition:opacity 0.6s; }
#artifact-overlay.show { opacity:1; pointer-events:all; }
.ov-glyph { font-size:3.5rem; margin-bottom:24px; filter:drop-shadow(0 0 20px rgba(139,115,85,0.4)); }
.ov-found { font-family:'Cinzel',serif; font-size:0.5rem; letter-spacing:0.5em; color:rgba(139,115,85,0.6); margin-bottom:14px; }
.ov-name { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:2.2rem; color:var(--parchment); margin-bottom:6px; }
.ov-role { font-family:'Cinzel',serif; font-size:0.48rem; letter-spacing:0.3em; color:var(--tarnished-gold); margin-bottom:20px; }
.ov-desc { font-style:italic; font-size:0.87rem; color:var(--ash-white); line-height:1.7; max-width:260px; margin-bottom:36px; }
.ov-btn { border:1px solid rgba(139,115,85,0.4); padding:13px 36px; font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:0.35em; color:var(--tarnished-gold); background:transparent; cursor:pointer; transition:all 0.35s; }
.ov-btn:hover { background:rgba(139,115,85,0.1); color:var(--parchment); }

/* HALLUCINATION overlay */
#halluc-overlay { position:fixed; inset:0; z-index:180; background:rgba(10,5,15,0.97); display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px; }
#halluc-overlay.show { display:flex; animation:hallucIn 0.8s ease forwards; }
@keyframes hallucIn { from{opacity:0} to{opacity:1} }
.halluc-text { font-family:'Cormorant Garamond',serif; font-size:clamp(1.1rem,5vw,1.6rem); font-style:italic; color:rgba(180,80,160,0.8); line-height:1.8; max-width:320px; margin-bottom:40px; }
.halluc-sub { font-family:'Cinzel',serif; font-size:0.5rem; letter-spacing:0.3em; color:rgba(139,115,85,0.4); margin-bottom:30px; }
.halluc-btn { border:1px solid rgba(139,115,85,0.3); padding:12px 32px; font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:0.3em; color:rgba(139,115,85,0.6); background:transparent; cursor:pointer; transition:all 0.35s; }
.halluc-btn:hover { color:var(--tarnished-gold); border-color:rgba(139,115,85,0.6); }

/* FALSE ITEM MOMENT */
#false-overlay { position:fixed; inset:0; z-index:210; background:rgba(15,5,5,0.98); display:none; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 30px; }
#false-overlay.show { display:flex; animation:hallucIn 1s ease forwards; }
.false-icon { font-size:3rem; margin-bottom:20px; filter:drop-shadow(0 0 20px rgba(180,40,40,0.5)); }
.false-title { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:300; color:#c06060; margin-bottom:8px; }
.false-sub { font-family:'Cinzel',serif; font-size:0.48rem; letter-spacing:0.3em; color:#7a3a3a; margin-bottom:20px; }
.false-desc { font-style:italic; font-size:0.87rem; color:rgba(180,80,80,0.7); line-height:1.7; max-width:280px; margin-bottom:36px; }
.false-btn { border:1px solid rgba(180,60,60,0.3); padding:13px 36px; font-family:'Cinzel',serif; font-size:0.58rem; letter-spacing:0.35em; color:#c06060; background:transparent; cursor:pointer; transition:all 0.35s; }
.false-btn:hover { background:rgba(180,60,60,0.08); }

/* Room themes */
body[data-room="atrium"] { --room-bg:#0c0c14; --room-accent:#8b7355; --room-glow:rgba(42,58,92,0.06); --room-vignette:#0c0c14; --room-text:#c9c5bf; }
body[data-room="library"],body[data-room="library_book"],body[data-room="library_name"],body[data-room="library_flame"] { --room-bg:#110d08; --room-accent:#a07840; --room-glow:rgba(139,100,50,0.1); --room-vignette:#110d08; --room-text:#d4c9b0; }
body[data-room="observatory"],body[data-room="observatory_lens"],body[data-room="observatory_stars"],body[data-room="observatory_raven"] { --room-bg:#060810; --room-accent:#6a7fa0; --room-glow:rgba(42,58,92,0.14); --room-vignette:#060810; --room-text:#b0bcd0; }
body[data-room="map_room"],body[data-room="map_compass"],body[data-room="map_drift"] { --room-bg:#0e0c08; --room-accent:#9a8040; --room-glow:rgba(100,80,30,0.1); --room-vignette:#0e0c08; --room-text:#ccc5a8; }
body[data-room="scriptorium"],body[data-room="scriptorium_notes"],body[data-room="scriptorium_quill"] { --room-bg:#0e0e0a; --room-accent:#9a8860; --room-glow:rgba(139,115,85,0.08); --room-vignette:#0e0e0a; --room-text:#ccc5b0; }
body[data-room="restricted"],body[data-room="restricted_door"],body[data-room="restricted_seal"],body[data-room="restricted_key"] { --room-bg:#0a0814; --room-accent:#7060a0; --room-glow:rgba(60,40,100,0.1); --room-vignette:#0a0814; --room-text:#c0b8d0; }
body[data-room="cellar"],body[data-room="cellar_deep"],body[data-room="cellar_call"],body[data-room="cellar_passage"] { --room-bg:#060606; --room-accent:#445060; --room-glow:rgba(20,30,40,0.08); --room-vignette:#030303; --room-text:#909898; }
body[data-room="archivist_glimpse"],body[data-room="archivist_name"],body[data-room="archivist_yourname"],body[data-room="archivist_time"],body[data-room="archivist_trap"],body[data-room="archivist_apology"],body[data-room="archivist_chosen"],body[data-room="archivist_denial"],body[data-room="archivist_freedom"],body[data-room="archivist_promise"],body[data-room="archivist_count"] { --room-bg:#100c18; --room-accent:#8870b0; --room-glow:rgba(80,60,120,0.08); --room-vignette:#100c18; --room-text:#c8c0d8; }
body[data-room="archivist_chamber"],body[data-room="chamber_chair"],body[data-room="chamber_mirror"],body[data-room="chamber_notready"],body[data-room="chamber_question"],body[data-room="chamber_refuse"],body[data-room="chamber_end"] { --room-bg:#0c0a10; --room-accent:#c9a84c; --room-glow:rgba(139,115,85,0.06); --room-vignette:#0c0a10; --room-text:#e8dcc4; }
body[data-room="ending"] { --room-bg:#08080c; --room-accent:#8b7355; --room-vignette:#05050a; --room-text:#a0988c; }
</style>
</head>
<body data-room="atrium">

<canvas id="env-canvas"></canvas>
<div id="vignette"></div>
<div id="noise"></div>

<!-- HALLUCINATION -->
<div id="halluc-overlay">
  <div class="halluc-text" id="halluc-text"></div>
  <div class="halluc-sub">THE ARCHIVE DOES NOT RECOMMEND PROCEEDING WITHOUT LIGHT</div>
  <button class="halluc-btn" onclick="dismissHalluc()">PULL BACK</button>
</div>

<!-- FALSE ITEM MOMENT -->
<div id="false-overlay">
  <div class="false-icon" id="false-icon"></div>
  <div class="false-title" id="false-title"></div>
  <div class="false-sub">IT WAS NEVER WHAT IT APPEARED TO BE</div>
  <div class="false-desc" id="false-desc"></div>
  <button class="false-btn" onclick="dismissFalse()">CONTINUE</button>
</div>

<!-- ARTIFACT OVERLAY -->
<div id="artifact-overlay">
  <div class="ov-glyph" id="ov-icon"></div>
  <div class="ov-found" id="ov-found-label">ARTIFACT DISCOVERED</div>
  <div class="ov-name" id="ov-name"></div>
  <div class="ov-role" id="ov-role"></div>
  <div class="ov-desc" id="ov-desc"></div>
  <button class="ov-btn" onclick="dismissArtifact()">TAKE IT</button>
</div>

<!-- PANEL -->
<div id="panel-overlay" onclick="closePanelIfBg(event)">
  <div id="panel">
    <div class="panel-tabs">
      <button class="ptab active" onclick="switchPanel('inventory')">CARRIED</button>
      <button class="ptab" onclick="switchPanel('journal')">JOURNAL</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
    <div class="panel-close" onclick="closePanel()">— CLOSE —</div>
  </div>
</div>

<!-- TITLE -->
<div id="title-screen">
  <div class="t-eyebrow">A SENTIENT LIBRARY</div>
  <span class="t-word">THE</span>
  <span class="t-word">MIDNIGHT</span>
  <span class="t-word gold">ARCHIVE</span>
  <div class="t-rule"></div>
  <div class="t-tagline">Where knowledge becomes prison,<br>and the keeper becomes the kept.</div>
  <button class="t-btn" onclick="startGame()">ENTER THE ARCHIVE</button>
  <div class="t-whisper">...another one wanders in...</div>
</div>

<!-- GAME -->
<div id="game-screen">
  <div class="hud">
    <div class="hud-left">THE MIDNIGHT ARCHIVE</div>
    <div class="hud-pips" id="pips"></div>
    <div class="hud-right">
      <button class="hud-btn" onclick="openPanel('inventory')">CARRIED</button>
      <button class="hud-btn" onclick="openPanel('journal')">JOURNAL</button>
    </div>
  </div>
  <div class="room-env">
    <div class="room-env-art" id="env-art"></div>
    <div class="room-env-gradient"></div>
    <div class="room-env-inner">
      <div>
        <div class="room-eyebrow" id="room-eyebrow"></div>
        <div class="room-heading" id="room-heading"></div>
      </div>
    </div>
  </div>
  <div class="narrative" id="narrative"></div>

// ══════════════════════════════════════════
// JOURNAL SYSTEM
// ══════════════════════════════════════════
function addJournal(text, type='player') {
  const elapsed = Math.floor((Date.now() - S.startTime) / 60000);
  const timeStr = elapsed < 1 ? 'upon entering' : `after ${elapsed} minute${elapsed>1?'s':''}`;
  S.journal.unshift({ text, type, time: timeStr, rooms: S.roomCount });
}

// Corruption level 0-4 based on time (minutes)
function corruptionLevel() {
  const mins = (Date.now() - S.startTime) / 60000;
  if (mins < 3) return 0;
  if (mins < 7) return 1;
  if (mins < 12) return 2;
  if (mins < 18) return 3;
  return 4;
}

// Archive voice text gets corrupted at higher levels
function archiveVoice(normal, corrupted) {
  const lvl = corruptionLevel();
  if (lvl < 2) return { s: normal, cls: '' };
  if (lvl < 3) return { s: normal, cls: 'corrupted' };
  return { s: corrupted || normal, cls: 'corrupted' };
}

// Archivist voice mimicked by Archive at high corruption
function archivistVoice(normal, mimic) {
  const lvl = corruptionLevel();
  if (lvl < 3) return { s: normal, cls: '' };
  return { s: mimic || normal, cls: 'archive-mimic' };
}

      {t:'italic', s:'The chair. Behind you. You feel it now the way you feel gravity.'},
      {t:'archivist', s:'...Thank you. For listening. No one has stayed long enough to listen in—'},

    ],

    choices: ()=>[{l:'SIT', d:'The ending arrives not as defeat, but as a weight settling. As inevitability.', a:()=>go('ending')}]

  ending: {
    eyebrow:'THE MIDNIGHT ARCHIVE', heading:'The New Archivist', sub:'THE LOOP CLOSES',

      {t:'normal', s:'The knowing begins.'},
      {t:'italic', s:'Not all at once. Gently, the way dawn comes — too gradual to mark the moment it arrives.'},
      {t:'normal', s:'You feel the Archive unfold inside you. Every room. Every truth. Every Seeker who has ever walked these halls.'},
      {t:'normal', s:'It is vast.'},

// ══════════════════════════════════════════
// ENGINE
// ══════════════════════════════════════════
function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

async function typeText(el, text, speed) {
  el.classList.add('show');
  if (!text) return;
  const cur = document.createElement('span'); cur.className='tcursor'; el.appendChild(cur);
  for (let i=0;i<text.length;i++) { cur.insertAdjacentText('beforebegin',text[i]); await delay(speed); }
  cur.remove();
}

async function renderRoom(id) {
  const room = ROOMS[id];
  if (!room) { go('atrium'); return; }
  S.room = id;
  S.roomCount++;
  document.body.setAttribute('data-room', id);

  const isFirst = !S.visited.has(id);
  if (isFirst) S.visited.add(id);
  if (room.onEnter) room.onEnter();

  document.getElementById('hud-sub') && (document.getElementById('hud-sub').textContent = '');
  document.getElementById('room-eyebrow').textContent = room.eyebrow;
  document.getElementById('room-heading').textContent = room.heading;
  document.getElementById('env-art').innerHTML = getEnv(id);

  const narr = document.getElementById('narrative');
  const choicesEl = document.getElementById('choices');
  narr.innerHTML = '';
  choicesEl.innerHTML = '';
  window.scrollTo(0,0);

  const blocks = isFirst ? room.first : (typeof room.repeat === 'function' ? room.repeat() : (room.repeat || room.first));

  for (const block of blocks) {
    const el = document.createElement('div');
    el.className = 'tl';
    if (block.t==='italic') el.classList.add('t-italic');
    if (block.t==='archive') { el.classList.add('t-archive'); if(block.cls) el.classList.add(block.cls); }
    if (block.t==='archivist') { el.classList.add('t-archivist'); if(block.cls) el.classList.add(block.cls); }
    if (block.t==='discovery') el.classList.add('t-discovery');
    if (block.t==='false-discovery') el.classList.add('t-false-discovery');
    if (block.t==='empty') el.classList.add('t-empty');
    if (block.t==='raven') el.classList.add('t-raven');
    narr.appendChild(el);
    const speed = block.t==='archive'?30:block.t==='archivist'?26:block.t==='discovery'||block.t==='false-discovery'?22:18;
    await typeText(el, block.s, speed);
    await delay(block.t==='archivist'?200:block.t==='italic'?100:60);
    el.scrollIntoView({behavior:'smooth',block:'end'});
  }

  await delay(500);
  showChoices(room);
}

function showChoices(room) {
  const el = document.getElementById('choices');
  const choices = room.choices();
  el.innerHTML = `<div class="choices-rule"></div>`;
  choices.forEach(c=>{
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `<span class="choice-label">▸ ${c.l}</span>${c.d}`;
    btn.onclick = ()=>{ el.innerHTML=''; c.a(); };
    el.appendChild(btn);
  });
  el.scrollIntoView({behavior:'smooth',block:'end'});
}

function go(id) { renderRoom(id); updatePips(); }

// ══════════════════════════════════════════
// COLLECT REAL ARTIFACT
// ══════════════════════════════════════════
function collect(id, next) {
  if (S.artifacts.includes(id)) { go(next); return; }
  S.artifacts.push(id);
  updatePips();
  const real = S.artifacts.length;
  addJournal(`I found ${REAL_ARTIFACTS[id].name}. ${real} artifact${real!==1?'s':''} now.`, 'player');
  S.pendingNext = S.artifacts.length === 6 ? 'chamber_end' : next;
  const a = REAL_ARTIFACTS[id];
  document.getElementById('ov-icon').textContent = a.icon;
  document.getElementById('ov-found-label').textContent = 'ARTIFACT DISCOVERED';
  document.getElementById('ov-found-label').style.color = '';
  document.getElementById('ov-name').textContent = a.name;
  document.getElementById('ov-role').textContent = a.role;
  document.getElementById('ov-desc').textContent = a.desc;
  document.getElementById('artifact-overlay').classList.add('show');
}

// ══════════════════════════════════════════
// COLLECT FALSE ARTIFACT
// ══════════════════════════════════════════
function collectFalse(id, next) {
  if (S.falseItems.includes(id)) { go(next); return; }
  S.falseItems.push(id);
  updatePips();
  S.pendingNext = next;
  const f = FALSE_ARTIFACTS[id];
  addJournal(`I found something. I think it is significant. I am not sure why.`, 'player');
  document.getElementById('ov-icon').textContent = f.icon;
  document.getElementById('ov-found-label').textContent = 'FRAGMENT DISCOVERED';
  document.getElementById('ov-found-label').style.color = '#9a6060';
  document.getElementById('ov-name').textContent = f.name;
  document.getElementById('ov-role').textContent = f.role;
  document.getElementById('ov-desc').textContent = f.desc;
  document.getElementById('artifact-overlay').classList.add('show');
}

function dismissArtifact() {
  document.getElementById('artifact-overlay').classList.remove('show');
  go(S.pendingNext);
}

// ══════════════════════════════════════════
// FALSE ITEM ACTIVATION (at mirror moment)
// ══════════════════════════════════════════
function checkFalseActivation() {
  if (S.falseActivated || S.falseItems.length === 0) return false;
  // Only activates if player has 5 real artifacts and tries to get mirror
  if (S.artifacts.length < 5) return false;
  S.falseActivated = true;

  // Raven can save if trust >= 3
  if (S.ravenTrust >= 3) {
    S.ravenSaved = true;
    addJournal('Something happened at the mirror. Something tried to take from me. A shadow in my pocket. But something else — a weight on my shoulder, brief, and then gone — and the shadow dissolved. I think I know what it was.', 'player');
    // Show raven save
    showRavenSave();
    return true; // activate but raven negates it
  }

  // Pick a random real artifact to steal
  const steal = S.artifacts[Math.floor(Math.random()*S.artifacts.length)];
  S.falseVictim = steal;
  S.artifacts = S.artifacts.filter(a=>a!==steal);
  updatePips();

  const falseId = S.falseItems[0];
  const f = FALSE_ARTIFACTS[falseId];
  S.falseItems = [];

  addJournal(`Something was taken from me at the mirror. The ${REAL_ARTIFACTS[steal]?.name}. It is gone.`, 'player');

  document.getElementById('false-icon').textContent = f.icon;
  document.getElementById('false-title').textContent = f.name;
  document.getElementById('false-desc').textContent = f.revealDesc;
  document.getElementById('false-overlay').classList.add('show');

  return true;
}

function showRavenSave() {
  // Inject raven-save narrative into current screen
  const narr = document.getElementById('narrative');
  const el = document.createElement('div');
  el.className='tl t-raven show';
  el.textContent = 'A weight lands on your shoulder. Brief. Cold. A single feather drifts down. Something that was reaching into your pocket withdraws. The raven is gone before you can turn to look.';
  narr.appendChild(el);
  el.scrollIntoView({behavior:'smooth',block:'end'});
}

function dismissFalse() {
  document.getElementById('false-overlay').classList.remove('show');
  // Player now has one less artifact, must go find it again (loop back)
  go('atrium');
}

// ══════════════════════════════════════════
// HALLUCINATION (cellar without flame)
// ══════════════════════════════════════════
function goHalluc() {
  const text = HALLUCINATIONS[Math.floor(Math.random()*HALLUCINATIONS.length)];
  document.getElementById('halluc-text').textContent = text;
  document.getElementById('halluc-overlay').classList.add('show');
  addJournal('I went too deep without light. Something happened. I do not want to write what I saw.', 'player');
}

function dismissHalluc() {
  document.getElementById('halluc-overlay').classList.remove('show');
  go('cellar');
}

// ══════════════════════════════════════════
// PIPS
// ══════════════════════════════════════════
function updatePips() {
  const el = document.getElementById('pips');
  const realIds = Object.keys(REAL_ARTIFACTS);
  el.innerHTML = realIds.map(id=>
    `<div class="pip ${S.artifacts.includes(id)?'lit':''}" title="${REAL_ARTIFACTS[id].name}"></div>`
  ).join('') +
  S.falseItems.map(id=>
    `<div class="pip false" title="?"></div>`
  ).join('');
}

// ══════════════════════════════════════════
// PANEL (inventory/journal)
// ══════════════════════════════════════════
let currentPanel = 'inventory';

function openPanel(tab) {
  currentPanel = tab;
  document.getElementById('panel-overlay').classList.add('open');
  renderPanel(tab);
  document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.ptab[onclick="switchPanel('${tab}')"]`)?.classList.add('active');
}

function switchPanel(tab) {
  currentPanel = tab;
  renderPanel(tab);
  document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.ptab[onclick="switchPanel('${tab}')"]`)?.classList.add('active');
}

function closePanel() { document.getElementById('panel-overlay').classList.remove('open'); }
function closePanelIfBg(e) { if(e.target===document.getElementById('panel-overlay')) closePanel(); }

function renderPanel(tab) {
  const body = document.getElementById('panel-body');
  if (tab === 'inventory') {
    if (S.artifacts.length === 0 && S.falseItems.length === 0) {
      body.innerHTML = `<div class="inv-empty">You carry nothing yet.</div>`;
    } else {
      let html = '';
      S.artifacts.forEach(id=>{
        const a = REAL_ARTIFACTS[id];
        html += `<div class="inv-item"><div class="inv-icon">${a.icon}</div><div class="inv-name">${a.name}</div><div class="inv-role">${a.role}</div><div class="inv-desc">${a.desc}</div></div>`;
      });
      S.falseItems.forEach(id=>{
        const f = FALSE_ARTIFACTS[id];
        html += `<div class="inv-item inv-false"><div class="inv-icon">${f.icon}</div><div class="inv-name">${f.name}</div><div class="inv-role">${f.role}</div><div class="inv-desc">${f.desc}</div></div>`;
      });
      if (S.ravenMet) {
        const trustText = S.ravenTrust===0?'She has seen you.':S.ravenTrust===1?'She has decided you are not a threat.':S.ravenTrust===2?'She stepped onto your hand. She remembers you.':'She chose you. She has not forgotten.';
        html += `<div class="inv-raven"><div class="inv-raven-label">THE RAVEN</div><div class="inv-raven-text">${trustText}</div></div>`;
      }
      body.innerHTML = html;
    }
  } else {
    // Journal
    if (S.journal.length === 0) {
      body.innerHTML = `<div class="inv-empty">Nothing written yet.</div>`;
    } else {
      const lvl = corruptionLevel();
      body.innerHTML = S.journal.map(j=>{
        let cls = j.type==='archive'?'archive-entry':j.type==='corrupted'?'corrupted-entry':'';
        // At high corruption, some player entries look corrupted
        if (j.type==='player' && lvl>=3 && Math.random()<0.3) cls='corrupted-entry';
        return `<div class="j-entry"><div class="j-time">${j.time}</div><div class="j-text ${cls}">${j.text}</div></div>`;
      }).join('');
    }
  }
}

// ══════════════════════════════════════════
// CANVAS PARTICLES
// ══════════════════════════════════════════
const canvas = document.getElementById('env-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }

function spawnP() {
  return { x:Math.random()*canvas.width, y:canvas.height+10, size:Math.random()*1.5+0.5, speed:Math.random()*0.4+0.15, opacity:0, max:Math.random()*0.3+0.04, drift:(Math.random()-0.5)*0.3 };
}

function drawParticles() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const accent = getComputedStyle(document.body).getPropertyValue('--room-accent').trim()||'#8b7355';
  particles.forEach((p,i)=>{
    p.y-=p.speed; p.x+=p.drift;
    p.opacity = p.y<canvas.height*0.8 ? Math.min(p.max,p.opacity+0.004) : Math.max(0,p.opacity-0.003);
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=accent; ctx.globalAlpha=p.opacity; ctx.fill();
    if(p.y<-10) particles.splice(i,1);
  });
  ctx.globalAlpha=1;
  if(particles.length<20&&Math.random()<0.05) particles.push(spawnP());
  requestAnimationFrame(drawParticles);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
function startGame() {
  S.startTime = Date.now();
  document.getElementById('title-screen').style.display='none';
  document.getElementById('game-screen').classList.add('active');
  updatePips();
  addJournal('I entered the Archive. I do not remember choosing to.', 'player');
  go('atrium');
}

function reset() {
  Object.assign(S, { room:'atrium', artifacts:[], falseItems:[], visited:new Set(), roomCount:0, startTime:Date.now(), ravenMet:false, ravenTrust:0, ravenSaved:false, lensUses:0, quillDrain:0, falseActivated:false, falseVictim:null, pendingNext:null, journal:[] });
  updatePips();
  addJournal('I entered the Archive. I do not remember choosing to.', 'player');
  go('atrium');
}

resizeCanvas();
window.addEventListener('resize',resizeCanvas);
drawParticles();

// Periodic journal corruption entries from Archive
setInterval(()=>{
  if (!S.startTime) return;
  const lvl = corruptionLevel();
  if (lvl < 1) return;
  const archiveEntries = [
    'the seeker continues. the archive continues. these are the same statement.',
    'we have been watching since the door.',
    'the artifacts are not yours. you are borrowing them until you become them.',
    'the raven has a name. you will not learn it.',
    'every path you have walked has been a path we made.',
    'you feel like you are making choices. this is the Archive\'s greatest gift to you.',
  ];
  const idx = Math.floor((Date.now()-S.startTime)/120000) % archiveEntries.length;
  const entry = archiveEntries[idx];
  if (!S.journal.find(j=>j.text===entry)) {
    S.journal.unshift({text:entry, type: lvl>=3?'corrupted':'archive', time:`after ${Math.floor((Date.now()-S.startTime)/60000)} minutes`, rooms:S.roomCount});
  }
}, 90000);

// Intercept mirror collection to check false activation
const originalCollect = collect;
// Override chamber_mirror choices to check false activation
const originalChamberMirrorChoices = ROOMS.chamber_mirror.choices;
ROOMS.chamber_mirror.choices = () => {
  if (S.artifacts.includes('mirror')) return [{l:'CONTINUE', d:'', a:()=>go('chamber_end')}];
  if (S.artifacts.length < 5) return [{l:'REACH FOR IT', d:'Your hand stops. Something holds you back. You are not ready.', a:()=>go('chamber_notready')}];
  return [{
    l:'TAKE THE MIRROR',
    d:'Your hand does not shake. You expected it to.',
    a:()=>{
      if (S.falseItems.length > 0) {
        const activated = checkFalseActivation();
        if (activated && !S.ravenSaved) return; // false overlay shows, do not collect
      }
      collect('mirror','chamber_end');
    }
  }];
};
